<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scam Guardian — check a message without sending it anywhere</title>
<meta name="description" content="Paste a suspicious message and see which phrases are manipulation. Runs entirely in your browser — nothing is sent anywhere.">
<style>
:root {
  --paper:      #eef0f4;
  --surface:    #ffffff;
  --ink:        #141820;
  --ink-soft:   #59616e;
  --rule:       #d7dbe3;
  --high:       #8e2f39;
  --high-wash:  #f7e8e9;
  --mid:        #8a6410;
  --mid-wash:   #f8efdb;
  --neutral:    #59616e;

  --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace;
}

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 17px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.shell { max-width: 46rem; margin: 0 auto; padding: 0 1.25rem 6rem; }

/* ── masthead ─────────────────────────────────────────── */
.masthead {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 1rem; flex-wrap: wrap;
  padding: 1.5rem 0 3rem;
}
.wordmark {
  font-family: var(--mono);
  font-size: 0.9rem; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  margin: 0;
}
.masthead__side { display: flex; align-items: center; gap: 1.25rem; }
.langs { display: flex; gap: 0.25rem; }
.lang {
  font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.1em;
  text-transform: uppercase;
  background: none; border: 1px solid transparent; border-radius: 2px;
  color: var(--ink-soft); padding: 0.25rem 0.5rem; cursor: pointer;
}
.lang[aria-pressed="true"] { color: var(--ink); border-color: var(--rule); background: var(--surface); }
.source {
  font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--ink-soft); text-decoration: none;
  border-bottom: 1px solid var(--rule); padding-bottom: 1px;
}
.source:hover { color: var(--ink); }

/* ── opening ──────────────────────────────────────────── */
.tagline {
  font-size: clamp(1.9rem, 5.5vw, 2.9rem);
  line-height: 1.12; letter-spacing: -0.022em; font-weight: 600;
  margin: 0 0 1.25rem; max-width: 22ch;
}
.lead { font-size: 1.05rem; color: var(--ink-soft); margin: 0 0 2.5rem; max-width: 54ch; }

/* ── input ────────────────────────────────────────────── */
.composer { margin-bottom: 3rem; }
.field {
  width: 100%; min-height: 11rem; resize: vertical;
  padding: 1.15rem 1.25rem;
  background: var(--surface); color: var(--ink);
  border: 1px solid var(--rule); border-radius: 3px;
  font-family: var(--mono); font-size: 0.92rem; line-height: 1.65;
}
.field:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
.field::placeholder { color: #9aa2b0; }

.controls { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
.action {
  font-family: var(--sans); font-size: 0.95rem; font-weight: 500;
  background: var(--ink); color: var(--paper);
  border: 1px solid var(--ink); border-radius: 3px;
  padding: 0.7rem 1.4rem; cursor: pointer;
}
.action:hover { background: #000; }
.action:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; }
.status { font-size: 0.9rem; color: var(--high); }

.examples { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1.5rem; align-items: center; }
.examples__label {
  font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink-soft); margin-right: 0.25rem;
}
.example {
  font-family: var(--sans); font-size: 0.85rem;
  background: none; color: var(--ink-soft);
  border: 1px solid var(--rule); border-radius: 999px;
  padding: 0.35rem 0.85rem; cursor: pointer;
}
.example:hover { border-color: var(--ink-soft); color: var(--ink); }
.example:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

/* ── result ───────────────────────────────────────────── */
.result { border-top: 1px solid var(--rule); padding-top: 2.5rem; }
.result[hidden] { display: none; }

.verdict { display: flex; align-items: baseline; gap: 0.9rem; margin-bottom: 2.5rem; }
.verdict__bar { width: 3px; align-self: stretch; background: var(--neutral); flex: none; }
.result--block   .verdict__bar { background: var(--high); }
.result--confirm .verdict__bar { background: var(--mid); }
.verdict__text {
  font-size: clamp(1.4rem, 4vw, 1.9rem); font-weight: 600;
  letter-spacing: -0.018em; line-height: 1.2; margin: 0;
}

.section { margin-bottom: 2.75rem; }
.section[hidden] { display: none; }
.section__head {
  font-family: var(--mono); font-size: 0.7rem; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft);
  margin: 0 0 0.9rem;
}

/* the specimen — the page's one bold move */
.specimen {
  background: var(--surface); border: 1px solid var(--rule); border-radius: 3px;
  padding: 1.25rem; font-family: var(--mono); font-size: 0.92rem; line-height: 2;
  white-space: pre-wrap; word-break: break-word;
}
.mark {
  font: inherit; color: inherit; cursor: pointer;
  background: var(--mid-wash); border: none; border-bottom: 2px solid var(--mid);
  border-radius: 2px 2px 0 0; padding: 0.1em 0.1em 0;
}
.mark--high { background: var(--high-wash); border-bottom-color: var(--high); }
.mark--low  { background: #e9ecf1; border-bottom-color: var(--neutral); }
.mark:hover { filter: brightness(0.96); }
.mark:focus-visible { outline: 2px solid var(--ink); outline-offset: 1px; }
.hint { font-size: 0.82rem; color: var(--ink-soft); margin: 0.7rem 0 0; }

.finding {
  border-left: 3px solid var(--neutral);
  background: var(--surface);
  padding: 1rem 1.15rem; margin-bottom: 0.6rem; border-radius: 0 3px 3px 0;
}
.finding--high { border-left-color: var(--high); }
.finding--mid  { border-left-color: var(--mid); }
.finding__title { font-size: 1rem; font-weight: 600; margin: 0 0 0.3rem; }
.finding__body { font-size: 0.95rem; color: var(--ink-soft); margin: 0; }
.finding--flash { animation: flash 1.1s ease-out; }
@keyframes flash { from { background: var(--mid-wash); } to { background: var(--surface); } }

.advice {
  font-size: 1.05rem; background: var(--surface);
  border: 1px solid var(--rule); border-radius: 3px;
  padding: 1.15rem 1.25rem; margin: 0;
}

.artifacts { list-style: none; margin: 0; padding: 0; }
.artifact {
  display: flex; align-items: baseline; gap: 0.75rem; flex-wrap: wrap;
  padding: 0.55rem 0; border-bottom: 1px solid var(--rule);
  font-family: var(--mono); font-size: 0.85rem;
}
.artifact__kind {
  color: var(--ink-soft); font-size: 0.68rem; letter-spacing: 0.1em;
  text-transform: uppercase; min-width: 8.5rem;
}
.artifact__value { word-break: break-all; }
.artifact__note { color: var(--high); font-size: 0.78rem; }

.technical { margin-top: 2.5rem; }
.technical__summary {
  font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--ink-soft); cursor: pointer;
}
.technical__body {
  font-family: var(--mono); font-size: 0.78rem; line-height: 1.6;
  background: var(--surface); border: 1px solid var(--rule); border-radius: 3px;
  padding: 1rem; margin: 0.8rem 0 0; overflow-x: auto; color: var(--ink-soft);
}

.colophon {
  border-top: 1px solid var(--rule); margin-top: 4rem; padding-top: 1.5rem;
  font-size: 0.85rem; color: var(--ink-soft);
}
.colophon a { color: var(--ink); }

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; scroll-behavior: auto !important; }
}
</style>
</head>
<body>
<div class="shell">

  <header class="masthead">
    <h1 class="wordmark">Scam Guardian</h1>
    <div class="masthead__side">
      <div class="langs">
        <button type="button" class="lang" data-lang="en" aria-pressed="false">EN</button>
        <button type="button" class="lang" data-lang="ru" aria-pressed="false">RU</button>
      </div>
      <a class="source" href="https://github.com/rusmoody/scam-guardian">Source</a>
    </div>
  </header>

  <main>
    <p class="tagline" id="tagline"></p>
    <p class="lead" id="lead"></p>

    <section class="composer">
      <textarea class="field" id="input" rows="7"></textarea>
      <div class="controls">
        <button type="button" class="action" id="check"></button>
        <span class="status" id="status" role="status"></span>
      </div>
      <div class="examples">
        <span class="examples__label" id="examples-label"></span>
        <span id="examples" style="display:contents"></span>
      </div>
    </section>

    <section class="result" id="result" hidden>
      <div class="verdict">
        <span class="verdict__bar" aria-hidden="true"></span>
        <h2 class="verdict__text" id="verdict-headline"></h2>
      </div>

      <section class="section" id="specimen-section">
        <h3 class="section__head" id="whats-happening"></h3>
        <div class="specimen" id="specimen"></div>
        <p class="hint" id="hint"></p>
      </section>

      <section class="section" id="findings-section">
        <div id="findings"></div>
      </section>

      <section class="section">
        <h3 class="section__head" id="what-to-do"></h3>
        <p class="advice" id="advice"></p>
      </section>

      <section class="section" id="artifacts-section" hidden>
        <h3 class="section__head" id="also-found"></h3>
        <ul class="artifacts" id="artifacts"></ul>
      </section>

      <details class="technical">
        <summary class="technical__summary" id="technical-summary"></summary>
        <pre class="technical__body" id="technical-body"></pre>
      </details>
    </section>
  </main>

  <footer class="colophon">
    <p id="privacy"></p>
    <p>Built on <a href="https://github.com/rusmoody/guardrails-core">guardrails-core</a>.
    Pattern datasets are open — <a href="https://github.com/rusmoody/scam-guardian/tree/main/data">contributions welcome</a>.</p>
  </footer>

</div>
<script type="module" src="/web/app.js"></script>
</body>
</html>
